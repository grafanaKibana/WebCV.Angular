<!-- Dynamic animated mesh gradient background with dark green theme and parallax -->
<app-background 
  [baseColor]="'#123524'" 
  [numGradients]="5" 
  [animate]="true"
  [speed]="0.75"
  [parallax]="true">
</app-background>

<div class="wrapper">
  <app-header></app-header>
  <div class="main-container">
    <router-outlet></router-outlet>
  </div>
  <app-footer></app-footer>
</div>
