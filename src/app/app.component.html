<!-- High-performance WebGL mesh gradient background with Stripe-like implementation -->
<app-webgl-background 
  [speed]="0.5"
  [amplitude]="0.2"
  [darkerTop]="true"
  [parallax]="true"
  [parallaxIntensity]="0.5">
  <!-- Color scheme is not explicitly set, so a random one will be chosen on load -->
</app-webgl-background>

<div class="wrapper">
  <app-header></app-header>
  <div class="main-container">
    <router-outlet></router-outlet>
  </div>
  <app-footer></app-footer>
</div>
