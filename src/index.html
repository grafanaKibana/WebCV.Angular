<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ReshetnikCV</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!--Fonts - consolidated to only what's actually used-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Poppins is the main font, JetBrains Mono for code - loaded via CSS -->

  <script>
    // Prevent first-paint flash: hide app until intro completes.
    // Intro shows only once per tab session.
    (function () {
      try {
        var KEY = 'webcv.introSeen.v1';
        var qs = new URLSearchParams(window.location.search || '');
        var debugParam = qs.get('intro');
        var debug =
          debugParam === '1' ||
          debugParam === 'true' ||
          debugParam === 'debug' ||
          localStorage.getItem('webcv.intro.debug') === '1';

        var seen = sessionStorage.getItem(KEY) === '1';
        var reduce =
          window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)') &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if ((debug || !seen) && !reduce) {
          document.documentElement.classList.add('intro-prehide');
          document.documentElement.classList.add('intro-animate');
        }
      } catch (e) {
        // ignore
      }
    })();
  </script>
</head>
  <body>
    <app-root></app-root>
  </body>
</html>
