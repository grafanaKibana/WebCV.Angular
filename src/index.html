  <script>
    // Prevent first-paint flash: hide app until intro completes.
    // Intro shows only once per tab session.
    (function () {
      try {
        var KEY = 'webcv.introSeen.v1';
        var qs = new URLSearchParams(window.location.search || '');
        var debugParam = qs.get('intro');
        var debug =
          debugParam === '1' ||
          debugParam === 'true' ||
          debugParam === 'debug' ||
          localStorage.getItem('webcv.intro.debug') === '1';

        var seen = sessionStorage.getItem(KEY) === '1';
        var reduce =
          window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)') &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        if ((debug || !seen) && !reduce) {
          document.documentElement.classList.add('intro-prehide');
          document.documentElement.classList.add('intro-animate');
        }
      } catch (e) {
        // ignore
      }
    })();
